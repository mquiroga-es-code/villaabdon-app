<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Villa Abdón</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="app/assets/icons/icon-32.png" />
  <link rel="apple-touch-icon" href="app/assets/icons/icon-192.png" />
  <meta name="theme-color" content="#ffffff" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f7f7f5;
      color: #222;
    }
    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
    }
    .catalogo {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .catalogo img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <header>
    <h1>Villa Abdón</h1>
    <p>Cabañas y bungalow en Santa Cruz, Bolivia</p>
  </header>

  <main class="catalogo">
    <img src="app/assets/images/Catálogo Villa Abdón_page-0001.jpg" alt="Catálogo página 1" />
    <img src="app/assets/images/Catálogo Villa Abdón_page-0002.jpg" alt="Catálogo página 2" />
    <img src="app/assets/images/Catálogo Villa Abdón_page-0003.jpg" alt="Catálogo página 3" />
    <img src="app/assets/images/Catálogo Villa Abdón_page-0004.jpg" alt="Catálogo página 4" />
    <img src="app/assets/images/Catálogo Villa Abdón_page-0005.jpg" alt="Catálogo página 5" />
    <img src="app/assets/images/Catálogo Villa Abdón_page-0006.jpg" alt="Catálogo página 6" />
    <img src="app/assets/images/Catálogo Villa Abdón_page-0007.jpg" alt="Catálogo página 7" />
    <img src="app/assets/images/Catálogo Villa Abdón_page-0008.jpg" alt="Catálogo página 8" />
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(() => console.log('Service Worker registrado'))
          .catch((err) => console.error('Error registrando Service Worker:', err));
      });
    }
  </script>
</body>
</html>
